<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生K线图 - 正式版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 8%, rgba(30, 41, 59, 0.08), transparent 38%),
        linear-gradient(165deg, #f8fafc, #f1f5f9 52%, #eef2ff);
      color: #0f172a;
      padding: 24px;
    }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.16);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(120deg, #0f172a, #1e293b 58%, #334155);
      color: #fff;
      padding: 24px 28px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
    }
    .header h1 { font-size: 30px; margin-bottom: 6px; letter-spacing: 0.5px; }
    .header p { opacity: 0.86; line-height: 1.65; font-size: 13px; }
    .content {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      padding: 20px;
    }
    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .panel h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #0f172a;
      padding-left: 10px;
      border-left: 4px solid #334155;
    }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    .field input, .field select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 14px;
      background: #fff;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #475569;
      box-shadow: 0 0 0 3px rgba(71, 85, 105, 0.14);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    button, a.btn-link {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .generate-btn {
      background: linear-gradient(135deg, #334155, #1e293b 60%, #0f172a);
      color: #fff;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.28);
    }
    .reset-btn { background: #e2e8f0; color: #1e293b; }
    .main-right { display: grid; gap: 16px; }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #374151;
    }
    .tag {
      padding: 5px 11px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #cbd5e1;
      color: #334155;
      font-weight: 600;
    }
    #klineCanvas {
      width: 100%;
      height: 360px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fcfcff;
    }
    .reading {
      line-height: 2;
      color: #111827;
      white-space: pre-wrap;
      max-height: 620px;
      overflow: auto;
      padding: 4px 8px 4px 0;
    }
    .muted { color: #6b7280; font-size: 13px; line-height: 1.7; }
    .progress-wrap {
      margin-top: 10px;
      display: none;
    }
    .progress-wrap.show { display: block; }
    .progress-text {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 6px;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(135deg, #475569, #1e293b);
      transition: width 0.25s ease;
    }
    .confirm-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 80;
    }
    .confirm-mask.show { display: flex; }
    .confirm-modal {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #dbeafe;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
      padding: 18px;
    }
    .confirm-modal h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #0f172a;
    }
    .confirm-note {
      font-size: 13px;
      color: #b91c1c;
      line-height: 1.7;
      margin-bottom: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .confirm-summary {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      line-height: 1.85;
      font-size: 14px;
      color: #1e293b;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .confirm-actions button {
      border: none;
      border-radius: 10px;
      padding: 9px 15px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .cancel-btn {
      background: #e2e8f0;
      color: #334155;
    }
    .ok-btn {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }
    @media (max-width: 940px) {
      .content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

        </div>

        </div>

  </div>

  <div class="confirm-mask" id="confirmMask" aria-hidden="true">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h3 id="confirmTitle">请核对提交信息</h3>
      <div class="confirm-note">一次付费仅可提交一次。点击“确认并生成”后，信息将锁定且不可修改。</div>
      <div class="confirm-summary" id="confirmSummary"></div>
      <div class="confirm-actions">
        <button type="button" class="cancel-btn" id="confirmCancelBtn">取消</button>
        <button type="button" class="ok-btn" id="confirmOkBtn">确认并生成</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      let paidData = null;
      try {
        const paid = localStorage.getItem("life_kline_paid");
        paidData = paid ? JSON.parse(paid) : null;
      } catch (e) {
        paidData = null;
      }

      const nameEl = document.getElementById("name");
      const birthDateEl = document.getElementById("birthDate");
      const birthHourEl = document.getElementById("birthHour");
      const genderEl = document.getElementById("gender");
      const birthPlaceEl = document.getElementById("birthPlace");
      const generateBtn = document.getElementById("generateBtn");
      const metaInfo = document.getElementById("metaInfo");
      const readingText = document.getElementById("readingText");
      const canvas = document.getElementById("klineCanvas");
      const ctx = canvas.getContext("2d");
      const progressWrap = document.getElementById("progressWrap");
      const progressText = document.getElementById("progressText");
      const progressBar = document.getElementById("progressBar");
      const confirmMask = document.getElementById("confirmMask");
      const confirmSummary = document.getElementById("confirmSummary");
      const confirmCancelBtn = document.getElementById("confirmCancelBtn");
      const confirmOkBtn = document.getElementById("confirmOkBtn");
      let isGenerating = false;
      let isLockedAfterConfirm = false;

      const GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
      const ZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
      // 24节气分钟偏移（基准：1900-01-06 02:05 UTC）
      const SOLAR_TERM_MINUTES = [
        0, 21208, 42467, 63836, 85337, 107014, 128867, 150921, 173149, 195551, 218072, 240693,
        263343, 285989, 308563, 331033, 353350, 375494, 397447, 419210, 440795, 462224, 483532, 504758
      ];
      const SOLAR_TERM_BASE_UTC = Date.UTC(1900, 0, 6, 2, 5, 0);
      const SOLAR_TERM_YEAR_MS = 31556925974.7;
      const SOLAR_TERM_TABLE = buildSolarTermTable(1900, 2100);

      function hashString(input) {
        let hash = 2166136261;
        for (let i = 0; i < input.length; i++) {
          hash ^= input.charCodeAt(i);
          hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
        }
        return hash >>> 0;
      }

      function makeRandom(seed) {
        let x = seed || 123456789;
        return function () {
          x ^= x << 13;
          x ^= x >>> 17;
          x ^= x << 5;
          return ((x >>> 0) % 100000) / 100000;
        };
      }

      function getYearGZ(year) {
        const baseYear = 1984;
        const offset = year - baseYear;
        const gan = GAN[((offset % 10) + 10) % 10];
        const zhi = ZHI[((offset % 12) + 12) % 12];
        return gan + zhi;
      }

      function getMonthGZ(yearGanIndex, month) {
        const gan = GAN[(yearGanIndex * 2 + month + 1) % 10];
        const zhi = ZHI[(month + 1) % 12];
        return gan + zhi;
      }

      function addDays(dateObj, days) {
        return new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate() + days);
      }

      function getJdn(y, m, d) {
        const a = Math.floor((14 - m) / 12);
        const y2 = y + 4800 - a;
        const m2 = m + 12 * a - 3;
        return d + Math.floor((153 * m2 + 2) / 5) + 365 * y2 + Math.floor(y2 / 4) - Math.floor(y2 / 100) + Math.floor(y2 / 400) - 32045;
      }

      function getDayGZ(dateObj, hour) {
        // 日柱采用 JDN 通用公式：index = (JDN + 49) % 60
        // 并使用“23点子时换日”规则。
        const useDate = (hour === 23) ? addDays(dateObj, 1) : dateObj;
        const y = useDate.getFullYear();
        const m = useDate.getMonth() + 1;
        const d = useDate.getDate();
        const jdn = getJdn(y, m, d);
        const idx60 = ((jdn + 49) % 60 + 60) % 60;
        const gan = GAN[idx60 % 10];
        const zhi = ZHI[idx60 % 12];
        return gan + zhi;
      }

      function getHourGZ(dayGanIndex, hour) {
        // 子时=23-00，丑时=01-02 ...
        const zhiIndex = Math.floor((hour + 1) / 2) % 12;
        const zhi = ZHI[zhiIndex];
        const gan = GAN[(dayGanIndex * 2 + zhiIndex) % 10];
        return gan + zhi;
      }

      function getElementByGan(gan) {
        if ("甲乙".includes(gan)) return "木";
        if ("丙丁".includes(gan)) return "火";
        if ("戊己".includes(gan)) return "土";
        if ("庚辛".includes(gan)) return "金";
        return "水";
      }

      function getSolarTermDate(year, termIndex) {
        const ms = SOLAR_TERM_YEAR_MS * (year - 1900) + SOLAR_TERM_MINUTES[termIndex] * 60000 + SOLAR_TERM_BASE_UTC;
        return new Date(ms);
      }

      function toMD(dateObj) {
        return (dateObj.getUTCMonth() + 1) * 100 + dateObj.getUTCDate();
      }

      function buildSolarTermTable(startYear, endYear) {
        const table = {};
        for (let y = startYear; y <= endYear; y++) {
          // 用于切换年柱/月柱的12个“节”（偶数序号）
          table[y] = {
            xiaohan: toMD(getSolarTermDate(y, 0)), // 小寒
            lichun: toMD(getSolarTermDate(y, 2)),  // 立春
            jingzhe: toMD(getSolarTermDate(y, 4)), // 惊蛰
            qingming: toMD(getSolarTermDate(y, 6)),// 清明
            lixia: toMD(getSolarTermDate(y, 8)),   // 立夏
            mangzhong: toMD(getSolarTermDate(y, 10)),
            xiaoshu: toMD(getSolarTermDate(y, 12)),
            liqiu: toMD(getSolarTermDate(y, 14)),
            bailu: toMD(getSolarTermDate(y, 16)),
            hanlu: toMD(getSolarTermDate(y, 18)),
            lidong: toMD(getSolarTermDate(y, 20)),
            daxue: toMD(getSolarTermDate(y, 22))
          };
        }
        return table;
      }

      function getYearTermRow(year) {
        // 超出区间时回退到边界年，保持可用
        if (year < 1900) return SOLAR_TERM_TABLE[1900];
        if (year > 2100) return SOLAR_TERM_TABLE[2100];
        return SOLAR_TERM_TABLE[year];
      }

      function getYearGZByLiChun(dateObj) {
        const y = dateObj.getFullYear();
        const md = (dateObj.getMonth() + 1) * 100 + dateObj.getDate();
        const terms = getYearTermRow(y);
        const gzYear = md < terms.lichun ? (y - 1) : y;
        return getYearGZ(gzYear);
      }

      function getMonthBranchBySolarTerm(dateObj) {
        const y = dateObj.getFullYear();
        const md = (dateObj.getMonth() + 1) * 100 + dateObj.getDate();
        const terms = getYearTermRow(y);
        // 按“节”切月：寅月始于立春
        if (md >= terms.lichun && md < terms.jingzhe) return "寅";
        if (md >= terms.jingzhe && md < terms.qingming) return "卯";
        if (md >= terms.qingming && md < terms.lixia) return "辰";
        if (md >= terms.lixia && md < terms.mangzhong) return "巳";
        if (md >= terms.mangzhong && md < terms.xiaoshu) return "午";
        if (md >= terms.xiaoshu && md < terms.liqiu) return "未";
        if (md >= terms.liqiu && md < terms.bailu) return "申";
        if (md >= terms.bailu && md < terms.hanlu) return "酉";
        if (md >= terms.hanlu && md < terms.lidong) return "戌";
        if (md >= terms.lidong && md < terms.daxue) return "亥";
        if (md >= terms.daxue || md < terms.xiaohan) return "子";
        return "丑"; // 小寒到立春
      }

      function getMonthGZByYearAndDate(yearGZ, dateObj) {
        const yearGan = yearGZ[0];
        const monthBranch = getMonthBranchBySolarTerm(dateObj);
        const monthOrder = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
        const monthOffset = monthOrder.indexOf(monthBranch);
        const startMap = {
          "甲": "丙", "己": "丙",
          "乙": "戊", "庚": "戊",
          "丙": "庚", "辛": "庚",
          "丁": "壬", "壬": "壬",
          "戊": "甲", "癸": "甲"
        };
        const startGan = startMap[yearGan] || "甲";
        const ganIndex = (GAN.indexOf(startGan) + monthOffset) % 10;
        return GAN[ganIndex] + monthBranch;
      }

      function buildTrendData(seed, genderBias) {
        const rand = makeRandom(seed);
        const arr = [];
        let prevClose = 52 + rand() * 10 + genderBias;
        for (let age = 0; age <= 100; age += 2) {
          const cycle = Math.sin(age / 8) * 8 + Math.cos(age / 5) * 4;
          const noise = (rand() - 0.5) * 10;
          const open = Math.max(10, Math.min(95, prevClose + (rand() - 0.5) * 6));
          const close = Math.max(8, Math.min(98, open + cycle * 0.18 + noise));
          const high = Math.min(100, Math.max(open, close) + rand() * 6 + 1.5);
          const low = Math.max(0, Math.min(open, close) - rand() * 6 - 1.5);
          arr.push({
            age: age,
            open: Number(open.toFixed(1)),
            close: Number(close.toFixed(1)),
            high: Number(high.toFixed(1)),
            low: Number(low.toFixed(1))
          });
          prevClose = close;
        }
        return arr;
      }

      function drawKLine(data) {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        const left = 46;
        const right = 16;
        const top = 16;
        const bottom = 30;
        const chartW = w - left - right;
        const chartH = h - top - bottom;

        ctx.strokeStyle = "#d1d5db";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
          const y = top + (chartH * i / 5);
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(w - right, y);
          ctx.stroke();

          const value = (100 - i * 20).toString();
          ctx.fillStyle = "#6b7280";
          ctx.font = "12px sans-serif";
          ctx.fillText(value, 10, y + 4);
        }

        const step = chartW / data.length;
        const bodyWidth = Math.max(6, step * 0.48);

        function mapY(v) {
          return top + (100 - v) / 100 * chartH;
        }

        data.forEach(function (item, idx) {
          const x = left + step * idx + step * 0.5;
          const yOpen = mapY(item.open);
          const yClose = mapY(item.close);
          const yHigh = mapY(item.high);
          const yLow = mapY(item.low);
          const up = item.close >= item.open;
          const color = up ? "#dc2626" : "#16a34a";

          ctx.strokeStyle = color;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(x, yHigh);
          ctx.lineTo(x, yLow);
          ctx.stroke();

          const rectY = Math.min(yOpen, yClose);
          const rectH = Math.max(1.6, Math.abs(yOpen - yClose));
          ctx.fillStyle = color;
          ctx.fillRect(x - bodyWidth / 2, rectY, bodyWidth, rectH);

          if (idx % 5 === 0) {
            ctx.fillStyle = "#6b7280";
            ctx.font = "12px sans-serif";
            ctx.fillText(String(item.age), x - 10, h - 10);
          }
        });
      }

      function generateReading(profile, baziInfo, trendData) {
        const parts = [];
        const reportSeed = hashString([
          profile.name,
          profile.birthDate,
          profile.birthHour,
          profile.gender,
          profile.birthPlace,
          baziInfo.yearGZ,
          baziInfo.monthGZ,
          baziInfo.dayGZ,
          baziInfo.hourGZ
        ].join("|"));
        const rand = makeRandom(reportSeed);

        function pickMany(pool, count) {
          const arr = pool.slice();
          const out = [];
          while (arr.length && out.length < count) {
            const idx = Math.floor(rand() * arr.length);
            out.push(arr.splice(idx, 1)[0]);
          }
          return out;
        }

        function makeParagraphPool(title, banks, targetSize) {
          const result = [];
          const used = new Set();
          let safe = 0;
          while (result.length < targetSize && safe < targetSize * 20) {
            safe++;
            const line = banks.map(function (bank) {
              return bank[Math.floor(rand() * bank.length)];
            }).join("");
            if (used.has(line)) continue;
            used.add(line);
            result.push("【" + title + "】\n" + line);
          }
          return result;
        }

        function buildLongSection(title, banks, pickCounts) {
          const paragraphs = [];
          for (let i = 0; i < banks.length; i++) {

          "【阶段回撤处理】\n回撤期做减法：减目标、减焦虑、减无效社交，快速恢复主线。",
          "【表达与影响力】\n你的影响力来自长期稳定兑现，而非短期强表达。",
          "【复盘机制】\n固定周复盘与月复盘，是把运势优势转成现实成果的关键动作。",
          "【资源定价】\n你的价值应通过成果和流程双维度来定价，避免仅用时间换收入。",
          "【长期稳定】\n越是在变化期，越要坚持基础制度，稳定本身就是稀缺竞争力。",
          "【效率管理】\n把高价值任务放在精力峰值时段执行，完成质量会明显提高。",
          "【阶段布局】\n每个十年阶段都应有不同重心：积累期重能力，扩张期重结构，守成期重系统。",
          "【协同机制】\n你适合把关键关系转化为协同网络，而非临时互助关系。",
          "【行为纪律】\n可持续成果来自可重复动作，纪律性是运势落地的桥梁。"
        ];

        const extensionVariants = [
          "延伸判断：你的成长轨迹受地域文化与家庭节奏共同影响，建议把年度目标拆成季度里程碑，避免年底突击。",
          "延伸判断：在资源有限阶段，先保证现金流和健康，再追求规模扩张，会更符合你的长期结构。",
          "延伸判断：每次做重大选择前，建议先写下最坏情境和应对方案，能够显著降低焦虑与误判。",
          "延伸判断：你适合建立“输入-实践-复盘-沉淀”的闭环，连续执行比单次爆发更有效。",
          "延伸判断：若出现关系与事业冲突，优先保留长期价值高的一侧，短期损失可在后续修复。",
          "延伸判断：建议建立个人知识库，把经验沉淀成模板，可持续放大你的执行效率。",
          "延伸判断：在高压力时期，减少无效承诺，保留关键行动，会明显改善运势体感。",
          "延伸判断：每季度保留一段“策略空窗期”用于校准方向，可避免路径依赖。",
          "延伸判断：当你能把复杂问题拆成可执行清单，整体节奏会从被动转为主动。",
          "延伸判断：保持稳定作息是你提升判断质量的底层杠杆，优先级应高于短期任务。"
        ];

        const deepInsights = [
          "深度分析：从你的运势结构看，这个主题不是短期决策题，而是长期配置题。建议你按“目标-资源-节奏-反馈”四步法推进，每一步都设定客观检查点，避免仅凭感受判断成败。",
          "深度分析：这类议题在你的人生中会反复出现，真正的突破点不在一次性强攻，而在持续稳定地做正确动作。只要连续执行三到六个月，趋势通常会出现可观转变。",
          "深度分析：当前阶段最怕的是“方向正确但节奏失控”。你需要给每个目标设置上限和下限，保证推进速度与身心承载能力一致，这样才能长期不掉线。",
          "深度分析：你的结构更适合“先搭系统再追速度”。先把流程、模板、关键指标建立起来，再扩大投入规模，效率会明显高于直接堆时间。",
          "深度分析：很多波动并非运势本身的问题，而是策略与环境错配。建议每季度做一次策略体检：哪些方法有效、哪些应停止、哪些该升级。"
        ];

        const actionPlans = [
          "执行建议：未来四周请固定每周一次复盘，分别记录“做对了什么、做错了什么、下周只改一件事”。复盘越具体，改进越稳定。",
          "执行建议：把这个主题拆成“日动作、周动作、月动作”三级任务。日动作负责连续性，周动作负责校正，月动作负责升级。",
          "执行建议：当你感到犹豫时，先做最小闭环动作（10-30分钟可完成），再决定是否扩展。这样能显著减少拖延。",
          "执行建议：建立一个可视化进度板，把关键指标放在同一屏幕。每次决策前先看数据，再看情绪，能有效降低误判。",
          "执行建议：建议设置“风险缓冲带”，包括时间缓冲、资金缓冲和情绪缓冲。缓冲带越充分，执行越从容。"
        ];

        const riskAlerts = [
          "风险提醒：不要在高波动阶段同时开启过多战线，容易导致精力分散。宁可少做，也要做深。",
          "风险提醒：避免“短期比较”触发的冲动决策。你的优势来自长期复利，不来自单次胜负。",
          "风险提醒：关系层面的消耗会直接影响事业效率。请定期清理无效社交，把资源留给关键关系。",
          "风险提醒：如果连续两周睡眠不足，建议立即降档目标。先恢复状态，再恢复强度。",
          "风险提醒：任何高收益方案都要先看可回撤性，确保出现失误时仍可快速回到主线。"
        ];

        const shuffledBlocks = pickMany(uniqueBlocks, uniqueBlocks.length);
        for (let i = 0; i < shuffledBlocks.length; i++) {
          if (parts.join("\n\n").length >= 5200) break;
          const ext = extensionVariants[i % extensionVariants.length];
          const deep = deepInsights[i % deepInsights.length];
          const plan = actionPlans[i % actionPlans.length];
          const risk = riskAlerts[i % riskAlerts.length];
          parts.push(shuffledBlocks[i] + "\n" + deep + "\n" + plan + "\n" + risk + "\n" + ext);
        }

        parts.push(
          "【结语与行动纲领】\n" +
          "短期（3个月）：聚焦一个最重要目标，建立每周复盘表。\n" +
          "中期（1-3年）：完成主业护城河建设，形成稳定现金流与核心作品。\n" +
          "长期（3年以上）：在稳定关系、健康体能和资产安全三方面同步升级。\n" +
          "本解读为静态网页规则生成，仅供个人成长与规划参考，不构成任何医疗、法律、投资或婚恋决策依据。请理性看待相关内容，反对封建迷信，避免将结果作为绝对判断。"
        );

        return parts.join("\n\n");
      }

      function renderMeta(profile, baziInfo, trendData) {
        const peak = trendData.reduce(function (a, b) {
          return b.high > a.high ? b : a;
        }, trendData[0]);
        const valley = trendData.reduce(function (a, b) {
          return b.low < a.low ? b : a;
        }, trendData[0]);
        metaInfo.innerHTML = [
          `<span class="tag">姓名：${profile.name}</span>`,
          `<span class="tag">性别：${profile.gender}</span>`,
          `<span class="tag">出生地：${profile.birthPlace}</span>`,
          `<span class="tag">四柱（简化）：${baziInfo.yearGZ} ${baziInfo.monthGZ} ${baziInfo.dayGZ} ${baziInfo.hourGZ}</span>`,
          `<span class="tag">主元素：${baziInfo.mainElement}</span>`,
          `<span class="tag">四柱来源：静态节气算法</span>`,
          `<span class="tag">峰值年龄：${peak.age}岁（${peak.high}）</span>`,
          `<span class="tag">回撤年龄：${valley.age}岁（${valley.low}）</span>`
        ].join("");
      }

      function setProgress(percent, text) {
        progressWrap.classList.add("show");
        progressBar.style.width = Math.max(0, Math.min(100, percent)) + "%";
        progressText.textContent = text;
      }

      function getSubmitUsageKey() {
        const key = paidData && paidData.tradeNo ? paidData.tradeNo : "preview_mode";
        return "life_kline_used_" + key;
      }

      function isUsed() {
        return localStorage.getItem(getSubmitUsageKey()) === "1";
      }

      function markUsed() {
        localStorage.setItem(getSubmitUsageKey(), "1");
      }

      function setInputsDisabled(disabled) {
        nameEl.disabled = disabled;
        birthDateEl.disabled = disabled;
        birthHourEl.disabled = disabled;
        genderEl.disabled = disabled;
        birthPlaceEl.disabled = disabled;
      }

      function lockByUsage() {
        setInputsDisabled(true);
        generateBtn.disabled = true;
        generateBtn.textContent = "本次付费已提交";
        setProgress(100, "本次付费资格已使用。若需测试其他日期，请返回付费页重新支付。");
      }

      function openConfirmModal(summaryText) {
        confirmSummary.textContent = summaryText;
        confirmMask.classList.add("show");
        confirmMask.setAttribute("aria-hidden", "false");
      }

      function closeConfirmModal() {
        confirmMask.classList.remove("show");
        confirmMask.setAttribute("aria-hidden", "true");
      }

      if (!paidData || !paidData.unlocked) {
        // 不阻断页面功能，避免因本地存储异常导致“点击无反应”。
        setProgress(0, "提示：未检测到付费记录，当前为本地预览模式。");
        setTimeout(function () {
          progressWrap.classList.remove("show");
        }, 1400);
      }

      if (isUsed()) {
        lockByUsage();
      }

      function sleep(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      async function runGenerate() {
        if (isUsed()) {
          lockByUsage();
          return;
        }
        if (isGenerating) return;
        isGenerating = true;
        generateBtn.disabled = true;
        generateBtn.textContent = "生成中...";

        const name = nameEl.value.trim();
        const birthDate = birthDateEl.value;
        const birthHour = Number(birthHourEl.value);
        const gender = genderEl.value;
        const birthPlace = birthPlaceEl.value.trim();

        if (!name || !birthDate || Number.isNaN(birthHour) || !birthPlace) {
          setProgress(0, "请完整填写姓名、生日、时辰、性别、出生地。");
          isGenerating = false;
          generateBtn.disabled = false;
          generateBtn.textContent = "生成人生K线图";
          return;
        }

        const dateObj = new Date(birthDate + "T00:00:00");
        if (Number.isNaN(dateObj.getTime())) {
          setProgress(0, "生日格式无效，请重新选择。");
          isGenerating = false;
          generateBtn.disabled = false;
          generateBtn.textContent = "生成人生K线图";
          return;
        }

        try {
        setProgress(10, "正在校验输入信息...");
        await sleep(80);

        setProgress(20, "正在按节气与干支规则计算四柱...");
        const yearGZ = getYearGZByLiChun(dateObj);
        const monthGZ = getMonthGZByYearAndDate(yearGZ, dateObj);
        const dayGZ = getDayGZ(dateObj, birthHour);
        const dayGanIndex = GAN.indexOf(dayGZ[0]);
        const hourGZ = getHourGZ(dayGanIndex, birthHour);
        const mainElement = getElementByGan(dayGZ[0]);
        setProgress(35, "四柱计算完成（静态节气算法）");
        await sleep(80);

        const profile = {
          name: name,
          gender: gender,
          birthDate: birthDate,
          birthHour: birthHour,
          birthPlace: birthPlace
        };
        const baziInfo = {
          yearGZ: yearGZ,
          monthGZ: monthGZ,
          dayGZ: dayGZ,
          hourGZ: hourGZ,
          mainElement: mainElement
        };

        const seed = hashString([name, birthDate, birthHour, gender, birthPlace].join("|"));
        const trendData = buildTrendData(seed, gender === "男" ? 1.3 : -0.5);
        setProgress(55, "正在绘制K线图...");
        await sleep(50);
        drawKLine(trendData);
        renderMeta(profile, baziInfo, trendData);
        setProgress(75, "正在生成长篇解读...");
        await sleep(30);
        readingText.textContent = generateReading(profile, baziInfo, trendData);
        markUsed();
        setProgress(100, "生成完成");
        await sleep(700);
        lockByUsage();
        } catch (err) {
          setProgress(0, "生成失败：" + (err && err.message ? err.message : "未知错误"));
        } finally {
          isGenerating = false;
          if (!isUsed() && !isLockedAfterConfirm) {
            generateBtn.disabled = false;
            generateBtn.textContent = "生成人生K线图";
          }
        }
      }

      generateBtn.addEventListener("click", function () {
        if (isUsed()) {
          lockByUsage();
          return;
        }
        const name = nameEl.value.trim();
        const birthDate = birthDateEl.value;
        const birthHour = birthHourEl.value;
        const gender = genderEl.value;
        const birthPlace = birthPlaceEl.value.trim();
        if (!name || !birthDate || !birthPlace) {
          setProgress(0, "请先完整填写姓名、生日、时辰、性别、出生地，再提交。");
          return;
        }
        const summaryText = [
          "姓名：" + name,
          "生日：" + birthDate,
          "时辰：" + String(birthHour).padStart(2, "0") + ":00",
          "性别：" + gender,
          "出生地：" + birthPlace
        ].join("\n");
        openConfirmModal(summaryText);
      });

      confirmCancelBtn.addEventListener("click", closeConfirmModal);
      confirmMask.addEventListener("click", function (e) {
        if (e.target === confirmMask) closeConfirmModal();
      });
      confirmOkBtn.addEventListener("click", function () {
        closeConfirmModal();
        isLockedAfterConfirm = true;
        setInputsDisabled(true);
        runGenerate();
      });
    })();
  </script>
</body>
</html>
