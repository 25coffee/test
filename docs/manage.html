<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理页（GitHub Pages 说明）</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 28px; line-height: 1.7; }
    .box { max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px; }
    h1 { margin: 0 0 10px; font-size: 20px; }
    a { color: #667eea; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f6f7ff; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>管理页在 GitHub Pages 上不可用</h1>
    <p>
      原项目的 <code>/manage</code> 需要后端（Flask）写入 <code>tests/tests.json</code>。
      GitHub Pages 只能托管静态文件，无法提供写入接口。
    </p>
    <p>
      你仍然可以通过直接编辑仓库里的 <code>tests/tests.json</code>（并同步到 <code>docs/tests/tests.json</code>）来更新测试内容。
    </p>
    <p><a href="./index.html">← 返回首页</a></p>
  </div>
</body>
</html>
