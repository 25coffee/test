<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理测试结果查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 650px;
      width: 100%;
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .sub {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a5568;
      box-shadow: 0 0 0 3px rgba(74, 85, 104, 0.1);
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4a5568;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      background: #2d3748;
      transform: translateY(-1px);
      box-shadow: 0 5px 20px rgba(74, 85, 104, 0.25);
    }
    .hint {
      margin-top: 14px;
      padding: 12px 14px;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }
    .hint code { background: #eef; padding: 1px 6px; border-radius: 6px; }
    .views-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
      padding: 16px 18px;
      margin-bottom: 18px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.25);
    }
    .views-box .views-label { font-size: 13px; opacity: 0.92; margin-bottom: 6px; }
    .views-box .views-count { font-size: 30px; font-weight: 800; line-height: 1.1; }
    .views-box .views-note { font-size: 12px; opacity: 0.85; margin-top: 6px; }
    .loading { text-align: center; color: #4a5568; display: none; margin-top: 14px; }
    .loading.show { display: block; }
    .error {
      color: #e74c3c;
      background: #fee;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
      display: none;
      white-space: pre-wrap;
    }
    .error.show { display: block; }
    .result-container {
      margin-top: 18px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
      display: none;
    }
    .result-container.show { display: block; }
    .result-title { color: #2d3748; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .test-name-display {
      color: #555;
      font-size: 15px;
      margin-bottom: 12px;
      padding: 10px;
      background: #edf2f7;
      border-radius: 8px;
      border-left: 4px solid #4a5568;
    }
    .result-text {
      color: #333;
      font-size: 16px;
      line-height: 1.7;
      padding: 12px;
      background: white;
      border-radius: 8px;
      border-left: 4px solid #4a5568;
      white-space: pre-wrap;
    }
    .small-links {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .feature-entry {
      margin-top: 14px;
      text-align: center;
    }
    .feature-entry a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #16a34a, #0ea5e9);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
      box-shadow: 0 8px 20px rgba(22, 163, 74, 0.28);
    }
    .feature-entry a:hover {
      filter: brightness(1.02);
      transform: translateY(-1px);
    }
    .small-links a {
      font-size: 12px;
      color: #667eea;
      text-decoration: none;
    }
    .small-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>心理测试结果查看</h1>
    <div class="sub"></div>

    <!-- 累积浏览量（静态站点：通过第三方统计服务提供） -->
    <div class="views-box">
      <div class="views-label">累计浏览量</div>
      <div class="views-count">
        <span id="busuanzi_value_site_pv">-</span>
      </div>
      <div class="views-note" id="viewsNote">加载中...</div>
    </div>

    <form id="testForm">
      <div class="form-group">
        <label for="test_id">测试编号</label>
        <input type="text" id="test_id" name="test_id" placeholder="例如：729f31" required>
      </div>

      <div class="form-group">
        <label for="options">选项（输入字母，如：AAABBC）</label>
        <input type="text" id="options" name="options" placeholder="例如：AAABBC" required>
      </div>

      <button type="submit">确认查看</button>
    </form>

    <div class="loading" id="loading">处理中...</div>
    <div class="error" id="error"></div>

    <div class="result-container" id="resultContainer">
      <div class="result-title" id="resultTitle"></div>
      <div class="test-name-display" id="testNameDisplay"></div>
      <div class="result-text" id="resultText"></div>
    </div>

    <div class="hint"></div>
    <div class="feature-entry">
      <a href="./life-kline-intro.html" id="lifeKlineEntry">八字算命</a>
    </div>
  </div>

  <script>
    // 累积浏览量：busuanzi（第三方统计服务）
    // 注意：如果该服务在某些网络环境下不可用，会自动降级为“不显示/显示-”。
    (function initViews() {
      const note = document.getElementById('viewsNote');
      if (note) note.textContent = '统计由第三方服务提供';
      // 如果 2.5s 还没加载出数值，就提示不可用
      setTimeout(() => {
        const pv = document.getElementById('busuanzi_value_site_pv');
        if (pv && (pv.textContent || '').trim() === '-') {
          if (note) note.textContent = '统计服务暂不可用';
        }
      }, 2500);
    })();

    async function loadTests() {
      const response = await fetch('./tests/tests.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`无法加载 tests.json（HTTP ${response.status}）`);
      }
      const data = await response.json();
      if (!Array.isArray(data)) {
        throw new Error('tests.json 格式不正确：期望是 JSON 数组');
      }
      return data;
    }

    function mostCommonLetter(options) {
      const counts = new Map();
      for (const ch of options) {
        if (ch >= 'A' && ch <= 'Z') {
          counts.set(ch, (counts.get(ch) || 0) + 1);
        }
      }
      let best = null;
      let bestCount = -1;
      for (const [k, v] of counts.entries()) {
        if (v > bestCount) {
          best = k;
          bestCount = v;
        }
      }
      return best;
    }

    document.getElementById('testForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const testId = document.getElementById('test_id').value.trim();
      const optionsRaw = document.getElementById('options').value.trim().toUpperCase();
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const resultContainer = document.getElementById('resultContainer');
      const resultTitle = document.getElementById('resultTitle');
      const testNameDisplay = document.getElementById('testNameDisplay');
      const resultText = document.getElementById('resultText');

      error.classList.remove('show');
      resultContainer.classList.remove('show');
      loading.classList.add('show');

      try {
        if (!testId) throw new Error('请输入测试编号');
        if (!optionsRaw) throw new Error('请输入选项');

        // 校验选项长度：必须是 10 或 15 个字母（A-Z）
        if (![10, 15].includes(optionsRaw.length)) {
          throw new Error('选项长度必须为 10 或 15 个字母');
        }
        if (!/^[A-E]+$/.test(optionsRaw)) {
          throw new Error('选项只能包含 A-E 字母');
        }

        const bestOption = mostCommonLetter(optionsRaw);
        if (!bestOption) throw new Error('选项不能为空（仅识别 A-E 字母）');

        const tests = await loadTests();
        const test = tests.find(t => String(t.test_id || '') === testId);
        if (!test) throw new Error(`未找到测试编号 "${testId}"`);

        const results = test.results || {};
        const result = results[bestOption];
        if (!result) throw new Error(`该测试未配置选项 ${bestOption} 的结果`);

        resultTitle.textContent = '测试结果';
        testNameDisplay.textContent = `测试名称：${test.test_name || ''}`;
        resultText.textContent = result;
        resultContainer.classList.add('show');
      } catch (err) {
        error.textContent = err && err.message ? err.message : String(err);
        error.classList.add('show');
      } finally {
        loading.classList.remove('show');
      }
    });

    // 兜底跳转：部分浏览器插件会劫持默认链接点击，这里补一层显式导航。
    (function () {
      const entry = document.getElementById('lifeKlineEntry');
      if (!entry) return;
      entry.addEventListener('click', function () {
        window.location.href = './life-kline-intro.html';
      });
    })();
  </script>

  <!-- busuanzi PV 统计脚本（静态站点可用） -->
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
