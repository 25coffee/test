<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试结果管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .test-id-display {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .test-id-display strong {
            color: #667eea;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        
        .option-item {
            display: flex;
            flex-direction: column;
        }
        
        .option-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .success {
            color: #28a745;
            background: #d4edda;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .success.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .error {
            color: #e74c3c;
            background: #fee;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 测试结果管理</h1>
        <a href="/" class="nav-link">← 返回测试页面</a>
        
        <form id="manageForm">
            <div class="form-group">
                <label for="test_name">测试名称：</label>
                <input type="text" id="test_name" name="test_name" placeholder="例如：性格测试" required>
                <div class="test-id-display">
                    测试编号（自动生成）：<strong id="test_id_display">输入测试名称后自动生成</strong>
                </div>
            </div>
            
            <div class="form-group">
                <label>测试结果选项：</label>
                <div class="options-grid">
                    <div class="option-item">
                        <div class="option-label">选项 A</div>
                        <textarea id="result_a" name="result_a" placeholder="输入选项A的测试结果"></textarea>
                    </div>
                    <div class="option-item">
                        <div class="option-label">选项 B</div>
                        <textarea id="result_b" name="result_b" placeholder="输入选项B的测试结果"></textarea>
                    </div>
                    <div class="option-item">
                        <div class="option-label">选项 C</div>
                        <textarea id="result_c" name="result_c" placeholder="输入选项C的测试结果"></textarea>
                    </div>
                    <div class="option-item">
                        <div class="option-label">选项 D</div>
                        <textarea id="result_d" name="result_d" placeholder="输入选项D的测试结果"></textarea>
                    </div>
                    <div class="option-item">
                        <div class="option-label">选项 E</div>
                        <textarea id="result_e" name="result_e" placeholder="输入选项E的测试结果"></textarea>
                    </div>
                </div>
            </div>
            
            <button type="submit">保存/更新测试</button>
        </form>
        
        <div class="loading" id="loading">保存中...</div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>
    
    <script>
        // 当测试名称输入时，自动生成并显示test_id
        document.getElementById('test_name').addEventListener('input', function(e) {
            const testName = e.target.value.trim();
            const testIdDisplay = document.getElementById('test_id_display');
            
            if (testName) {
                // 计算MD5前6位（这里简化处理，实际应该由后端计算）
                // 但为了实时显示，我们可以先显示提示
                testIdDisplay.textContent = '输入测试名称后自动生成（MD5前6位）';
                
                // 或者可以调用API获取
                fetch('/api/generate_test_id?test_name=' + encodeURIComponent(testName))
                    .then(response => response.json())
                    .then(data => {
                        if (data.test_id) {
                            testIdDisplay.textContent = data.test_id;
                        }
                    })
                    .catch(err => {
                        console.error('获取test_id失败:', err);
                    });
            } else {
                testIdDisplay.textContent = '输入测试名称后自动生成';
            }
        });
        
        // 表单提交
        document.getElementById('manageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            
            // 隐藏之前的结果和错误
            error.classList.remove('show');
            success.classList.remove('show');
            loading.classList.add('show');
            
            try {
                // 构建results对象
                const results = {};
                ['A', 'B', 'C', 'D', 'E'].forEach(option => {
                    const value = formData.get(`result_${option.toLowerCase()}`).trim();
                    if (value) {
                        results[option] = value;
                    }
                });
                
                // 构建请求数据
                const requestData = {
                    test_name: formData.get('test_name').trim(),
                    results: results
                };
                
                const response = await fetch('/api/save_test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                loading.classList.remove('show');
                
                if (response.ok && data.success) {
                    // 显示成功消息
                    success.textContent = `测试保存成功！测试编号：${data.test_id}`;
                    success.classList.add('show');
                    
                    // 更新显示的test_id
                    document.getElementById('test_id_display').textContent = data.test_id;
                    
                    // 3秒后自动隐藏成功消息
                    setTimeout(() => {
                        success.classList.remove('show');
                    }, 3000);
                } else {
                    // 显示错误
                    error.textContent = data.error || '保存失败';
                    error.classList.add('show');
                }
            } catch (err) {
                loading.classList.remove('show');
                error.textContent = '网络错误，请稍后重试';
                error.classList.add('show');
            }
        });
    </script>
</body>
</html>
